<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
</head>
<body>
    <div id="MyClockDisplay"  onload="showTime()"></div>
    <script>
        function showTime(){
	var date = new Date();
  var h = date.getHours();
	var m = date.getMinutes();
	var s = date.getSeconds();
	var session = "AM";

	if(h == 0){
        h = 12;
    }
    //Set session to PM
    if(h > 12){
        h = h - 12;
        session = "PM";
    }
    //Converting hours
    if(h > 12){
        h-h-12
    }
    //Add a leading 0 if the value is less than 10
	h = (h < 10) ? "0" + h : h;
    m = (m < 10) ? "0" + m : m;
    s = (s < 10) ? "0" + s : s;
    
	var time = h + ":" + m + ":" + s + " " + session;
	document.getElementById("MyClockDisplay").innerText = time;
  setTimeout(showTime, 1000);
}

showTime();
    </script>
</body>
</html>
